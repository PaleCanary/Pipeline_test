name: CI Pipeline

on:
  push:
    branches: [main]

job:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setu-python@v4
      with:
        python-version: '3.14'
      
    - name: Install depedencies
      run: pip instal -r requirements.txt

    - name: Run tests
      run: pytest

    - name Build Docker images:
      run: docker build -t my-pipeline .